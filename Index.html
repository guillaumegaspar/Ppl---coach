<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PPL Coach"/>
  <meta name="theme-color" content="#08080f"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>PPL Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080f; --surface: #0f0f1a; --surface2: #13131f;
      --border: #1a1a2e; --text: #e8e8f0; --muted: #4a4a6a; --dim: #1e1e32;
      --push: #FF4D6D; --pull: #4CC9F0; --legs: #9B5DE5;
      --run: #F7B731; --macro: #26de81; --red: #f87171; --green: #4ade80;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
    #root { height: 100%; display: flex; flex-direction: column; }
    * { -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 2px; } ::-webkit-scrollbar-thumb { background: #222; }
    input, textarea, select { font-family: 'DM Sans', sans-serif; color: var(--text); }
    button { cursor: pointer; border: none; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fadein { animation: fadeUp 0.3s ease both; }
    .page { flex: 1; overflow-y: auto; padding: 16px 16px calc(80px + var(--safe-bot)); }
    #nav {
      display: flex; background: #0a0a14; border-top: 1px solid var(--border);
      padding: 8px 0 calc(8px + var(--safe-bot)); flex-shrink: 0;
    }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; padding: 6px 4px; transition: all 0.2s; }
    .nav-btn .ico { font-size: 22px; }
    .nav-btn .lbl { font-size: 9px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; color: var(--muted); transition: color 0.2s; }
    .nav-btn.active .lbl { color: var(--push); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .card-p { padding: 14px 16px; }
    .inp { background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 9px 10px; font-size: 14px; text-align: center;
      outline: none; width: 100%; transition: border 0.2s; -webkit-appearance: none; }
    .inp:focus { border-color: #FF4D6D55; }
    .btn-primary { width: 100%; padding: 16px; border-radius: 14px; font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
      background: linear-gradient(135deg, var(--push), #c73652); color: #fff;
      box-shadow: 0 8px 24px rgba(255,77,109,0.25); transition: all 0.3s; }
    .btn-primary:active { transform: scale(0.98); }
    .sec-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 26px; letter-spacing: -0.5px; margin-bottom: 4px; }
    .sec-sub { font-size: 12px; color: var(--muted); margin-bottom: 18px; }
    .pill { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .reco { padding: 8px 12px; border-radius: 10px; margin: 4px 14px 10px; font-size: 11px; display: flex; align-items: flex-start; gap: 8px; }
    .reco.up { background: #0a2a1a; border: 1px solid #4ade8033; }
    .reco.hold { background: #0a0a2a; border: 1px solid #94a3b833; }
    .reco.down { background: #2a0a0a; border: 1px solid #f8717133; }
    .spark { display: block; }
    .macro-ring { position: relative; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<div id="root">
  <div class="page" id="page-content"></div>
  <nav id="nav">
    <button class="nav-btn active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="ico">🏠</span><span class="lbl">Accueil</span>
    </button>
    <button class="nav-btn" data-page="workout" onclick="navigate('workout')">
      <span class="ico">💪</span><span class="lbl">Muscu</span>
    </button>
    <button class="nav-btn" data-page="nutrition" onclick="navigate('nutrition')">
      <span class="ico">🥗</span><span class="lbl">Nutrition</span>
    </button>
    <button class="nav-btn" data-page="running" onclick="navigate('running')">
      <span class="ico">🏃</span><span class="lbl">Course</span>
    </button>
    <button class="nav-btn" data-page="history" onclick="navigate('history')">
      <span class="ico">📋</span><span class="lbl">Historique</span>
    </button>
  </nav>
</div>
<script src="app.js"></script>
</body>
</html>
